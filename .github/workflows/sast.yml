name: SAST

# One workflow, triggered on every push and pull request. Each scanner runs as
# its own job and uploads SARIF to the Security tab under a distinct category so
# the results stay separable. A final gate job merges everything and fails the
# build on a severity-threshold breach.
#
# Actions are pinned to commit SHAs (with a version comment) so the supply chain
# is fixed and the zizmor "unpinned-uses" audit stays clean.
on:
  # Push runs only on main; feature branches are covered by their pull request,
  # so an open PR no longer triggers two duplicate sets of checks.
  push:
    branches: [main]
  pull_request:

# Allow tools to publish results to the GitHub code-scanning (Security) tab.
permissions:
  contents: read
  security-events: write
  actions: read

env:
  # Severity at or above which the gate fails the build.
  SAST_THRESHOLD: HIGH

jobs:
  # ---------------------------------------------------------------------------
  semgrep:
    name: Semgrep CE
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install Semgrep CE
        run: pip install --quiet semgrep

      - name: Run Semgrep
        # p/* are the community rulesets; semgrep-rules/ are this repo's custom
        # rules. Semgrep exits 0 on findings (no --error), so the gate job — not
        # this one — decides pass/fail.
        run: |
          # Scan targets. Only the clean baseline is active; uncomment the
          # vulnerable ones to include them again.
          TARGETS="third-party/requests"
          # TARGETS="$TARGETS vulnerable-app"
          # TARGETS="$TARGETS third-party/pygoat"
          # TARGETS="$TARGETS third-party/vampi"
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --config p/secrets \
            --config semgrep-rules/ \
            --sarif --output semgrep.sarif \
            --metrics off \
            $TARGETS

      - name: Upload Semgrep SARIF to Security tab
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Share SARIF with the gate job
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sarif-semgrep
          path: semgrep.sarif
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL (security-extended)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: python
          queries: security-extended
          # Restrict analysis to the clean baseline. Uncomment the vulnerable
          # paths to analyze them again.
          config: |
            paths:
              - third-party/requests
              # - vulnerable-app
              # - third-party/pygoat
              # - third-party/vampi

      - name: Analyze
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          category: codeql
          # Also drop the SARIF on disk so the gate job can read it.
          output: codeql-results
          upload: always

      - name: Share SARIF with the gate job
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sarif-codeql
          path: codeql-results/*.sarif
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  gitleaks:
    name: Gitleaks (full history)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    env:
      GITLEAKS_VERSION: "8.21.2"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history so secrets in past commits are caught too.
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Install Gitleaks
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks
        # --exit-code 0 keeps the scan from failing the job; the gate decides.
        # Scoped to the clean baseline (filesystem scan, no git). To scan this
        # repo's full history for secrets again, swap back to the commented form.
        run: |
          gitleaks detect \
            --source third-party/requests \
            --no-git \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --redact \
            --exit-code 0
          # gitleaks detect \
          #   --source . \
          #   --report-format sarif \
          #   --report-path gitleaks.sarif \
          #   --redact \
          #   --exit-code 0

      - name: Upload Gitleaks SARIF to Security tab
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Share SARIF with the gate job
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sarif-gitleaks
          path: gitleaks.sarif
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # SCA: known CVEs in this repo's own dependency manifests. Scoped to files we
  # authored (submodule lockfiles are intentionally excluded), so no submodule
  # checkout is needed. OSV emits proper CVSS security-severity.
  osv:
    name: OSV-Scanner (SCA)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    env:
      OSV_VERSION: "2.4.0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install OSV-Scanner
        run: |
          curl -sSL "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64" -o osv-scanner
          sudo install osv-scanner /usr/local/bin/osv-scanner
          osv-scanner --version

      - name: Run OSV-Scanner
        # OSV exits non-zero when vulnerabilities are found; the gate decides.
        run: |
          osv-scanner scan source \
            -L go.mod \
            -L vulnerable-app/requirements.txt \
            --format sarif --output osv.sarif || true

      - name: Normalize OSV SARIF paths
        # OSV emits absolute file:// URIs; strip the workspace prefix so every
        # finding maps to a repo file in the Security tab (GitHub otherwise
        # drops results whose paths fall outside the checkout).
        run: |
          jq --arg ws "file://$GITHUB_WORKSPACE/" '
            walk(if type == "object" and (.uri? | type == "string") and (.uri | startswith($ws))
                 then .uri |= .[($ws | length):] else . end)
          ' osv.sarif > osv.normalized.sarif
          mv osv.normalized.sarif osv.sarif

      - name: Upload OSV SARIF to Security tab
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: osv.sarif
          category: osv

      - name: Share SARIF with the gate job
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sarif-osv
          path: osv.sarif
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # IaC / misconfiguration. Scoped to our own files via --skip-path (and no
  # submodule checkout). Checkov emits no numeric security-severity, so the gate
  # caps its findings at MEDIUM.
  checkov:
    name: Checkov (IaC)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install Checkov
        run: pip install --quiet checkov

      - name: Run Checkov
        # Checkov exits non-zero on findings; the gate decides. It writes
        # results_sarif.sarif into the output dir.
        run: |
          checkov -d . \
            --skip-path third-party \
            --output sarif --output-file-path . \
            --compact --quiet || true
          mv results_sarif.sarif checkov.sarif

      - name: Upload Checkov SARIF to Security tab
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: checkov.sarif
          category: checkov

      - name: Share SARIF with the gate job
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sarif-checkov
          path: checkov.sarif
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # CI/CD security: audits this repo's own workflows. zizmor emits no numeric
  # security-severity, so the gate caps its findings at MEDIUM.
  zizmor:
    name: zizmor (CI/CD)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install zizmor
        run: pip install --quiet zizmor

      - name: Run zizmor
        # --offline keeps the audit self-contained (no token needed).
        run: |
          zizmor --format sarif --offline .github/workflows > zizmor.sarif || true

      - name: Upload zizmor SARIF to Security tab
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: zizmor.sarif
          category: zizmor

      - name: Share SARIF with the gate job
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sarif-zizmor
          path: zizmor.sarif
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Software Bill of Materials. Informational only — not fed into the gate.
  sbom:
    name: SBOM (Syft)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Generate and upload SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: sbom.cyclonedx.json

  # ---------------------------------------------------------------------------
  gate:
    name: SAST gate
    runs-on: ubuntu-latest
    needs: [semgrep, codeql, gitleaks, osv, checkov, zizmor]
    # Run even if a scanner job failed, so a scanner crash can't silently skip
    # the gate. Missing SARIF files are simply not merged.
    if: always()
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"
          cache: false

      - name: Build the gate binary
        run: go build -trimpath -o sarifgate ./cmd/sarifgate

      - name: Download every scanner's SARIF
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: sarif-artifacts

      - name: Merge, deduplicate and gate
        run: |
          mapfile -t files < <(find sarif-artifacts -type f -name '*.sarif' | sort)
          echo "Merging ${#files[@]} SARIF file(s): ${files[*]}"
          ./sarifgate \
            -threshold "$SAST_THRESHOLD" \
            -output merged.sarif \
            -summary "$GITHUB_STEP_SUMMARY" \
            "${files[@]}"

      - name: Upload merged SARIF artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sarif-merged
          path: merged.sarif
          if-no-files-found: warn
