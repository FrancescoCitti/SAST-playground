name: Ad-hoc scan

# On-demand SAST run. Feed it either a public repo/gist URL to clone, or a
# file's contents from the gh CLI, and it runs the same tool set as the main
# pipeline — Semgrep, Gitleaks, CodeQL, OSV-Scanner (SCA), Checkov (IaC), zizmor
# (CI/CD) and a Syft SBOM — plus the gate, against that input. The target is
# only ever read (statically scanned) — it is never executed.
#
# Examples:
#   # Scan a public repository:
#   gh workflow run adhoc-scan.yml -f source_url=https://github.com/OWNER/REPO
#
#   # "Upload" a local file's contents and scan it:
#   gh workflow run adhoc-scan.yml -f filename=app.py -f code="$(cat ./app.py)"
#
# This run never fails on findings: no merge is happening, so the gate is purely
# informational. It prints a "WOULD PASS / WOULD FAIL" verdict to the run
# summary and logs, and uploads each scanner's SARIF as its own downloadable
# artifact. Nothing is written to the repository or the Security tab.
on:
  workflow_dispatch:
    inputs:
      source_url:
        description: "Public repo or gist URL to clone and scan (leave blank to use 'code')"
        required: false
        default: ""
      filename:
        description: "Filename for the 'code' input (basename only)"
        required: false
        default: "input.py"
      code:
        description: "File contents to scan; usually passed via gh CLI (ignored if source_url is set)"
        required: false
        default: ""
      threshold:
        description: "Severity used for the WOULD PASS / WOULD FAIL verdict"
        required: false
        default: "HIGH"
        type: choice
        options: [CRITICAL, HIGH, MEDIUM, LOW, NONE]

permissions:
  contents: read
  actions: read
  # read-only: lets CodeQL query its feature-flag API without being able to
  # write anything to the Security tab (SARIF still uses upload: never).
  security-events: read

jobs:
  adhoc:
    name: Ad-hoc scan
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.21.2"
      OSV_VERSION: "2.4.0"
    steps:
      # Checkout is needed for the custom Semgrep rules and the gate source.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"
          cache: false

      - name: Materialize the scan target
        # Inputs are passed through the environment (not interpolated into the
        # script) so target contents can never be interpreted as shell.
        env:
          SOURCE_URL: ${{ inputs.source_url }}
          FILENAME: ${{ inputs.filename }}
          CODE: ${{ inputs.code }}
        run: |
          set -euo pipefail
          mkdir -p scan-input
          if [ -n "$SOURCE_URL" ]; then
            echo "Cloning $SOURCE_URL"
            git clone --depth 1 "$SOURCE_URL" scan-input/repo
          elif [ -n "$CODE" ]; then
            # basename strips any path, so "../x" can't escape scan-input/.
            safe="$(basename "$FILENAME")"
            printf '%s' "$CODE" > "scan-input/$safe"
            echo "Wrote scan-input/$safe ($(wc -c < "scan-input/$safe") bytes)"
          else
            echo "::error::Provide either 'source_url' or 'code'."
            exit 1
          fi
          echo "--- files to scan ---"
          # || true: with pipefail, head closing early makes find exit 141
          # (SIGPIPE) on targets with >100 files. This line is informational.
          find scan-input -type f | head -100 || true

      - name: Install scanners
        run: |
          set -euo pipefail
          # Python tools go in isolated venvs (their pinned deps otherwise
          # collide in a shared environment).
          pipx install semgrep
          pipx install checkov
          pipx install zizmor
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          # Gitleaks
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          # OSV-Scanner
          curl -sSL "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64" -o osv-scanner
          sudo install osv-scanner /usr/local/bin/osv-scanner

      - name: Run Semgrep
        continue-on-error: true
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --config p/secrets \
            --config semgrep-rules/ \
            --sarif --output semgrep.sarif \
            --metrics off \
            scan-input

      - name: Run Gitleaks
        continue-on-error: true
        run: |
          gitleaks detect \
            --source scan-input \
            --no-git \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --redact \
            --exit-code 0

      - name: Run OSV-Scanner
        continue-on-error: true
        run: |
          osv-scanner scan source --recursive scan-input \
            --format sarif --output osv.sarif || true
          if [ -f osv.sarif ]; then
            jq --arg ws "file://$GITHUB_WORKSPACE/" '
              walk(if type == "object" and (.uri? | type == "string") and (.uri | startswith($ws))
                   then .uri |= .[($ws | length):] else . end)
            ' osv.sarif > osv.norm.sarif && mv osv.norm.sarif osv.sarif
          fi

      - name: Run Checkov
        continue-on-error: true
        run: |
          checkov -d scan-input \
            --output sarif --output-file-path . \
            --compact --quiet || true
          [ -f results_sarif.sarif ] && mv results_sarif.sarif checkov.sarif || true

      - name: Run zizmor
        continue-on-error: true
        # Only fires if the target actually ships GitHub Actions workflows.
        run: |
          wf="$(find scan-input -type d -path '*/.github/workflows' | head -1 || true)"
          if [ -n "$wf" ]; then
            zizmor --format sarif --offline "$wf" > zizmor.sarif || true
          else
            echo "No .github/workflows in the target — skipping zizmor."
          fi

      # CodeQL builds a database, so it is slower and only covers Python here. If
      # the target has no Python it is simply skipped (continue-on-error), and
      # analysis is restricted to scan-input via the paths config. upload: never
      # keeps ad-hoc results out of the Security tab.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        continue-on-error: true
        with:
          languages: python
          queries: security-extended
          config: |
            paths:
              - scan-input

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        continue-on-error: true
        with:
          output: codeql-results
          upload: never
          # Ad-hoc runs persist nothing; skip the CodeQL database upload (which
          # otherwise errors without security-events: write).
          upload-database: false

      - name: Build the gate binary
        if: always()
        run: go build -trimpath -o sarifgate ./cmd/sarifgate

      - name: Merge, evaluate and report (non-blocking)
        if: always()
        # Pass the input via env, not string interpolation, so it can never be
        # interpreted as shell (zizmor template-injection hygiene).
        env:
          THRESHOLD: ${{ inputs.threshold }}
        run: |
          set +e
          shopt -s nullglob
          # Collect only the SARIF files that were actually produced.
          SARIFS=()
          for f in semgrep.sarif gitleaks.sarif osv.sarif checkov.sarif zizmor.sarif codeql-results/*.sarif; do
            [ -f "$f" ] && SARIFS+=("$f")
          done
          echo "Merging: ${SARIFS[*]:-<none>}"

          if [ ${#SARIFS[@]} -eq 0 ]; then
            echo "### ⚠️ No SARIF produced — nothing to evaluate." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # -summary writes the severity table + finding list to the run summary.
          ./sarifgate -threshold "$THRESHOLD" \
            -output merged.sarif \
            -summary "$GITHUB_STEP_SUMMARY" \
            "${SARIFS[@]}"
          verdict=$?

          {
            echo ""
            echo "---"
            if [ "$verdict" -eq 0 ]; then
              echo "### ✅ Verdict: this input **WOULD PASS** the gate at $THRESHOLD."
            else
              echo "### ❌ Verdict: this input **WOULD FAIL** the gate at $THRESHOLD."
            fi
            echo ""
            echo "_Informational only — this run is intentionally not failed, because no merge is happening._"
          } | tee -a "$GITHUB_STEP_SUMMARY"

          # Always succeed: the verdict above is the signal, not the job status.
          exit 0

      # Each SARIF is uploaded as its own artifact so they appear as separate
      # downloadable entries rather than one bundle.
      - name: Upload Semgrep SARIF
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adhoc-semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: ignore

      - name: Upload Gitleaks SARIF
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adhoc-gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: ignore

      - name: Upload CodeQL SARIF
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adhoc-codeql-sarif
          path: codeql-results/*.sarif
          if-no-files-found: ignore

      - name: Upload OSV SARIF
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adhoc-osv-sarif
          path: osv.sarif
          if-no-files-found: ignore

      - name: Upload Checkov SARIF
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adhoc-checkov-sarif
          path: checkov.sarif
          if-no-files-found: ignore

      - name: Upload zizmor SARIF
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adhoc-zizmor-sarif
          path: zizmor.sarif
          if-no-files-found: ignore

      - name: Upload merged SARIF
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adhoc-merged-sarif
          path: merged.sarif
          if-no-files-found: ignore

      - name: Generate and upload SBOM
        if: always()
        continue-on-error: true
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: scan-input
          format: cyclonedx-json
          artifact-name: adhoc-sbom.cyclonedx.json
