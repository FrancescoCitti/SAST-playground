rules:
  - id: custom-hardcoded-secret
    languages: [python]
    severity: ERROR
    message: >
      Hardcoded secret assigned to a credential-named variable. Secrets in
      source are exposed to anyone with repository access and leak through git
      history. Read them from the environment or a secrets manager instead.
    metadata:
      category: security
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      security-severity: "7.5"
      confidence: MEDIUM
    patterns:
      # A string literal assigned to a credential-looking identifier.
      - pattern: $NAME = "..."
      - metavariable-regex:
          metavariable: $NAME
          regex: (?i).*(secret|password|passwd|api_?key|access_?key|token).*
      # Ignore empty strings and obvious placeholders.
      - metavariable-pattern:
          metavariable: $NAME
          patterns:
            - pattern-not-regex: (?i).*(example_placeholder|changeme).*
