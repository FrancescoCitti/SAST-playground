name: SAST

# One workflow, triggered on every push and pull request. Each scanner runs as
# its own job and uploads SARIF to the Security tab under a distinct category so
# the results stay separable. A final gate job merges everything and fails the
# build on a severity-threshold breach.
on:
  # Push runs only on main; feature branches are covered by their pull request,
  # so an open PR no longer triggers two duplicate sets of checks.
  push:
    branches: [main]
  pull_request:

# Allow tools to publish results to the GitHub code-scanning (Security) tab.
permissions:
  contents: read
  security-events: write
  actions: read

env:
  # Severity at or above which the gate fails the build.
  SAST_THRESHOLD: HIGH

jobs:
  # ---------------------------------------------------------------------------
  semgrep:
    name: Semgrep CE
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep CE
        run: pip install --quiet semgrep

      - name: Run Semgrep
        # p/* are the community rulesets; semgrep-rules/ are this repo's custom
        # rules. Semgrep exits 0 on findings (no --error), so the gate job — not
        # this one — decides pass/fail.
        run: |
          # Scan targets. Only the clean baseline is active; uncomment the
          # vulnerable ones to include them again.
          TARGETS="third-party/requests"
          # TARGETS="$TARGETS vulnerable-app"
          # TARGETS="$TARGETS third-party/pygoat"
          # TARGETS="$TARGETS third-party/vampi"
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --config p/secrets \
            --config semgrep-rules/ \
            --sarif --output semgrep.sarif \
            --metrics off \
            $TARGETS

      - name: Upload Semgrep SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Share SARIF with the gate job
        uses: actions/upload-artifact@v4
        with:
          name: sarif-semgrep
          path: semgrep.sarif
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL (security-extended)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended
          # Restrict analysis to the clean baseline. Uncomment the vulnerable
          # paths to analyze them again.
          config: |
            paths:
              - third-party/requests
              # - vulnerable-app
              # - third-party/pygoat
              # - third-party/vampi

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql
          # Also drop the SARIF on disk so the gate job can read it.
          output: codeql-results
          upload: always

      - name: Share SARIF with the gate job
        uses: actions/upload-artifact@v4
        with:
          name: sarif-codeql
          path: codeql-results/*.sarif
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  gitleaks:
    name: Gitleaks (full history)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    env:
      GITLEAKS_VERSION: "8.21.2"
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so secrets in past commits are caught too.
          fetch-depth: 0
          submodules: recursive

      - name: Install Gitleaks
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks
        # --exit-code 0 keeps the scan from failing the job; the gate decides.
        # Scoped to the clean baseline (filesystem scan, no git). To scan this
        # repo's full history for secrets again, swap back to the commented form.
        run: |
          gitleaks detect \
            --source third-party/requests \
            --no-git \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --redact \
            --exit-code 0
          # gitleaks detect \
          #   --source . \
          #   --report-format sarif \
          #   --report-path gitleaks.sarif \
          #   --redact \
          #   --exit-code 0

      - name: Upload Gitleaks SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Share SARIF with the gate job
        uses: actions/upload-artifact@v4
        with:
          name: sarif-gitleaks
          path: gitleaks.sarif
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  gate:
    name: SAST gate
    runs-on: ubuntu-latest
    needs: [semgrep, codeql, gitleaks]
    # Run even if a scanner job failed, so a scanner crash can't silently skip
    # the gate. Missing SARIF files are simply not merged.
    if: always()
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build the gate binary
        run: go build -trimpath -o sarifgate ./cmd/sarifgate

      - name: Download every scanner's SARIF
        uses: actions/download-artifact@v4
        with:
          path: sarif-artifacts

      - name: Merge, deduplicate and gate
        run: |
          mapfile -t files < <(find sarif-artifacts -type f -name '*.sarif' | sort)
          echo "Merging ${#files[@]} SARIF file(s): ${files[*]}"
          ./sarifgate \
            -threshold "$SAST_THRESHOLD" \
            -output merged.sarif \
            -summary "$GITHUB_STEP_SUMMARY" \
            "${files[@]}"

      - name: Upload merged SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sarif-merged
          path: merged.sarif
          if-no-files-found: warn
